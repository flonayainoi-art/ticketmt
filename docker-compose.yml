version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketmaster-db
    environment:
      POSTGRES_USER: ticketmaster
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticketmaster_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/schema.prisma:/docker-entrypoint-initdb.d/schema.prisma
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketmaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketmaster-network

  redis:
    image: redis:7-alpine
    container_name: ticketmaster-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketmaster-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ticketmaster-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ticketmaster:password@postgres:5432/ticketmaster_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-nextauth-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - ticketmaster-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ticketmaster-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-nextauth-secret}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - ticketmaster-network

volumes:
  postgres_data:
  redis_data:

networks:
  ticketmaster-network:
    driver: bridge
